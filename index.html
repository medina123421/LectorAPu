<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Edge Detector | e-Basketball Momios</title>
    <meta name="description" content="Detecta errores de momios en e-Basketball. Proyección automática y alertas en tiempo real." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">

      <header class="header">
        <div class="header-titles">
        <h1><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> EdgeDetector</h1>
        <p>e-Basketball H2H GG League</p>
        <div id="sync-status" class="sync-status">🔴 Esperando sincronización...</div>
      </div>
        <div class="header-right">
          <button id="notif-btn" class="icon-btn" title="Activar alertas">🔔</button>
          <button id="refresh-btn" class="icon-btn" title="Actualizar">↻</button>
        </div>
      </header>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num" id="stat-upcoming">0</span>
          <span class="stat-label">Próximos</span>
        </div>
        <div class="stat-item">
          <span class="stat-num accent" id="stat-live">0</span>
          <span class="stat-label">En Vivo</span>
        </div>
        <div class="stat-item">
          <span class="stat-num danger" id="stat-errors">0</span>
          <span class="stat-label">⚡ Errores</span>
        </div>
        <div class="stat-item">
          <span class="stat-num muted" id="stat-analyzed">0</span>
          <span class="stat-label">Analizados</span>
        </div>
      </div>

      <!-- Alert log -->
      <div id="alert-log" class="alert-log hidden">
        <div class="alert-log-header">
          <span>🚨 Movimientos de Línea Detectados</span>
          <button id="clear-alerts" class="clear-btn">Limpiar</button>
        </div>
        <div id="alert-log-body"></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="upcoming">📅 Próximos</button>
        <button class="tab" data-tab="live">🔴 En Vivo</button>
      </div>

      <main id="matches-container" class="matches-container">
        <div class="loader-wrap">
          <div class="spinner"></div>
          <p>Cargando partidos y estadísticas...</p>
        </div>
      </main>

      <div class="status-bar">
        <span class="dot pulse" id="status-dot"></span>
        <span id="status-text">Iniciando...</span>
        <span id="next-refresh" class="next-refresh"></span>
      </div>

    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
